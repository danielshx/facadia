<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HAWKEYE // Façade Targeting System</title>
<style>
  :root{
    --bg:#04080e; --panel:rgba(8,18,28,.72); --ink:#d7ecf6; --muted:#6f8aa0;
    --cyan:#4fe3ff; --gold:#ffb13b; --orange:#ff8a3b; --red:#ff5a5a;
    --line:rgba(79,227,255,.16); --grid:rgba(79,227,255,.05);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font:14px/1.55 var(--mono);color:var(--ink);background:var(--bg);min-height:100vh;
    background-image:
      radial-gradient(1200px 600px at 70% -10%, rgba(79,227,255,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(255,177,59,.06), transparent 60%),
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:auto,auto,34px 34px,34px 34px;
  }
  /* moving scan line */
  body::after{content:"";position:fixed;left:0;right:0;height:2px;top:0;z-index:9;
    background:linear-gradient(90deg,transparent,rgba(79,227,255,.55),transparent);
    animation:scan 6s linear infinite;pointer-events:none}
  @keyframes scan{0%{transform:translateY(0)}100%{transform:translateY(100vh)}}

  header{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:16px 24px;
    border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(8,20,32,.9),rgba(4,8,14,.4));
    backdrop-filter:blur(4px);position:sticky;top:0;z-index:8}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .logo{font-size:26px;filter:drop-shadow(0 0 10px rgba(79,227,255,.7))}
  .brand h1{margin:0;font-size:17px;letter-spacing:3px;color:#eaf9ff;
    text-shadow:0 0 12px rgba(79,227,255,.6)}
  .brand .sub{font-size:10.5px;letter-spacing:2px;color:var(--muted);margin-top:2px}
  .live{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:1.5px;color:var(--cyan)}
  .live .dot{width:9px;height:9px;border-radius:50%;background:var(--cyan);
    box-shadow:0 0 10px var(--cyan);animation:blink 1.3s ease-in-out infinite}
  @keyframes blink{50%{opacity:.25}}
  .spacer{flex:1}
  .loadbar{display:flex;gap:8px;align-items:center}
  .loadbar input[type=text]{background:#020912;border:1px solid var(--line);color:var(--cyan);
    padding:8px 10px;border-radius:6px;width:210px;font:12px var(--mono)}
  .btn{background:transparent;border:1px solid var(--cyan);color:var(--cyan);font:12px var(--mono);
    letter-spacing:1px;padding:8px 14px;border-radius:6px;cursor:pointer;
    text-shadow:0 0 8px rgba(79,227,255,.5);transition:.15s}
  .btn:hover{background:rgba(79,227,255,.12);box-shadow:0 0 14px rgba(79,227,255,.35)}

  main{max-width:1200px;margin:0 auto;padding:22px}
  .draft{font-size:11.5px;letter-spacing:1px;color:var(--gold);border:1px solid rgba(255,177,59,.35);
    background:rgba(255,177,59,.06);padding:9px 14px;border-radius:8px;margin-bottom:18px}

  .hud{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    box-shadow:inset 0 0 30px rgba(79,227,255,.04),0 0 0 1px rgba(0,0,0,.3)}
  .hud::before,.hud::after{content:"";position:absolute;width:16px;height:16px;border:2px solid var(--cyan);
    opacity:.8;filter:drop-shadow(0 0 4px rgba(79,227,255,.6))}
  .hud::before{top:-1px;left:-1px;border-right:0;border-bottom:0}
  .hud::after{bottom:-1px;right:-1px;border-left:0;border-top:0}

  .grid{display:grid;grid-template-columns:330px 1fr;gap:18px;align-items:start}
  @media(max-width:860px){.grid{grid-template-columns:1fr}}
  .hud .hd{padding:11px 16px;border-bottom:1px solid var(--line);font-size:12px;letter-spacing:2px;
    color:var(--cyan);text-shadow:0 0 8px rgba(79,227,255,.4)}
  .hud .bd{padding:16px}

  .score-wrap{display:flex;flex-direction:column;align-items:center;text-align:center}
  .gauge{position:relative;width:210px;height:210px;filter:drop-shadow(0 0 10px rgba(79,227,255,.25))}
  .gauge .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gauge .num b{font-size:50px;line-height:1;letter-spacing:-1px}
  .gauge .num span{font-size:10px;letter-spacing:2px;color:var(--muted);margin-top:4px}
  .band{margin-top:10px;font-size:12px;letter-spacing:1px}
  .meta{font-size:11.5px;color:var(--muted);margin-top:16px;width:100%}
  .meta div{display:flex;justify-content:space-between;gap:8px;padding:6px 0;border-top:1px solid rgba(79,227,255,.08)}
  .meta b{color:var(--ink);font-weight:500;text-align:right}

  .stats{display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .stat{flex:1;min-width:140px;padding:14px 16px}
  .stat b{font-size:30px;display:block;letter-spacing:-1px;text-shadow:0 0 12px currentColor}
  .stat span{font-size:10px;letter-spacing:2px;color:var(--muted)}

  h2.sec{font-size:11px;letter-spacing:3px;color:var(--muted);margin:24px 0 12px;
    display:flex;align-items:center;gap:10px}
  h2.sec::after{content:"";flex:1;height:1px;background:var(--line)}

  .defect{display:grid;grid-template-columns:250px 1fr;gap:0;overflow:hidden;margin-bottom:16px}
  @media(max-width:680px){.defect{grid-template-columns:1fr}}
  .shot{position:relative;background:#020912;cursor:zoom-in;overflow:hidden}
  .shot img{display:block;width:100%;height:100%;min-height:170px;object-fit:cover;opacity:.96}
  .shot .lock{position:absolute;top:8px;left:8px;font-size:9px;letter-spacing:1.5px;
    color:#02121a;background:var(--cyan);padding:2px 7px;border-radius:3px;font-weight:700}
  .info{padding:15px 18px}
  .row1{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:9px}
  .id{font-size:15px;color:#eaf9ff;letter-spacing:1px}
  .pill{font-size:11px;font-weight:700;letter-spacing:.5px;color:#02121a;padding:3px 10px;border-radius:4px;
    box-shadow:0 0 12px currentColor}
  .tag{font-size:10px;letter-spacing:1px;color:var(--muted);border:1px solid var(--line);padding:2px 8px;border-radius:4px}
  .flag{font-size:10px;letter-spacing:1px;font-weight:700;color:var(--red);border:1px solid rgba(255,90,90,.4);
    background:rgba(255,90,90,.08);padding:2px 8px;border-radius:4px;box-shadow:0 0 12px rgba(255,90,90,.25)}
  .measure{font-size:12.5px;margin:8px 0;color:var(--ink)}
  .measure code{color:var(--cyan);background:rgba(79,227,255,.08);padding:1px 6px;border-radius:4px}
  .conf{height:6px;background:rgba(79,227,255,.1);border-radius:4px;overflow:hidden;margin:8px 0;max-width:260px}
  .conf>i{display:block;height:100%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
  .txt{font:13px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:10px 0;color:#dceefa}
  .sub{font-size:11px;color:var(--muted);line-height:1.7}
  .sub b{color:var(--cyan);font-weight:500}

  .signoff{margin-top:14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .signoff .ok{color:var(--cyan);font-size:11px;letter-spacing:1px;display:none;text-shadow:0 0 8px rgba(79,227,255,.5)}
  .empty{color:var(--muted);text-align:center;padding:60px;letter-spacing:1px}

  dialog{border:1px solid var(--cyan);border-radius:10px;padding:0;background:#020912;
    box-shadow:0 0 40px rgba(79,227,255,.3)}
  dialog img{display:block;max-width:92vw;max-height:88vh}
  dialog .x{position:absolute;top:8px;right:12px;background:#020912cc;color:var(--cyan);
    border:1px solid var(--cyan);border-radius:6px;padding:6px 10px;cursor:pointer;font:11px var(--mono)}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">🦅</div>
    <div><h1>HAWKEYE</h1><div class="sub">FAÇADE TARGETING SYSTEM // MBIS</div></div>
  </div>
  <div class="live"><span class="dot"></span> SCAN ACTIVE</div>
  <div class="spacer"></div>
  <div class="loadbar">
    <input type="text" id="path" value="../demo/report.json" />
    <button class="btn" onclick="loadPath()">LOAD</button>
    <input type="file" id="file" accept="application/json" style="display:none" onchange="loadFile(event)">
    <button class="btn" onclick="document.getElementById('file').click()">FILE…</button>
  </div>
</header>

<main id="app"><div class="empty">⊙ AWAITING TARGET DATA — load a <code>report.json</code>.</div></main>

<dialog id="lb"><button class="x" onclick="lb.close()">✕ CLOSE</button><img id="lbimg"></dialog>

<script>
const SEV = {1:["Cosmetic","var(--cyan)"],2:["Minor","var(--cyan)"],3:["Moderate","var(--gold)"],
             4:["Serious","var(--orange)"],5:["Critical","var(--red)"]};
const lb = document.getElementById('lb');
const bandColor = s => s>=75?'var(--cyan)':s>=55?'var(--gold)':s>=35?'var(--orange)':'var(--red)';

function gauge(score){
  const r=86,c=2*Math.PI*r,off=c*(1-score/100),col=bandColor(score);
  // reticle ticks around the ring
  let ticks='';
  for(let i=0;i<60;i++){const a=i/60*2*Math.PI,big=i%5===0;
    const r1=big?70:74,r2=78;
    ticks+=`<line x1="${105+r1*Math.cos(a)}" y1="${105+r1*Math.sin(a)}" x2="${105+r2*Math.cos(a)}" y2="${105+r2*Math.sin(a)}" stroke="rgba(79,227,255,.25)" stroke-width="${big?1.4:.7}"/>`;}
  return `<svg class="gauge" viewBox="0 0 210 210">
    ${ticks}
    <circle cx="105" cy="105" r="${r}" fill="none" stroke="rgba(79,227,255,.10)" stroke-width="10"/>
    <circle cx="105" cy="105" r="${r}" fill="none" stroke="${col}" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 105 105)"
      style="filter:drop-shadow(0 0 6px ${col})"/>
  </svg><div class="num"><b style="color:${col};text-shadow:0 0 18px ${col}">${score}</b>
    <span>HEALTH INDEX / 100</span></div>`;
}
function imgSrc(p){if(/^https?:|^data:|^\//.test(p))return p;return p.startsWith('../')?p:'../'+p;}

function render(rep){
  const b=rep.building||{},h=rep.health||{},ds=rep.defects||[];
  const meta=[['ADDRESS',b.address],['DATE',b.inspection_date],['SOURCE',b.footage],
    ['STANDOFF',(b.standoff_m??'—')+' m'],['GSD',(b.gsd_mm_per_px??'—')+' mm/px'],['ENGINE',b.model]]
    .map(([k,v])=>`<div><span>${k}</span><b>${v??'—'}</b></div>`).join('');

  const cards = ds.length ? ds.map(d=>{
    const [lab,col]=SEV[d.severity]||["?","var(--muted)"];const m=d.measurement||{};
    return `<div class="defect hud">
      <div class="shot" onclick="zoom('${imgSrc(d.annotated||d.frame)}')">
        <img src="${imgSrc(d.annotated||d.frame)}" alt="${d.id}"><span class="lock">◎ TARGET LOCKED</span>
      </div>
      <div class="info">
        <div class="row1">
          <span class="id">${d.id}</span>
          <span class="pill" style="background:${col};color:#02121a">SEV-${d.severity} · ${lab.toUpperCase()}</span>
          <span class="tag">${(d.mbis_category||'').replace(/_/g,' ').toUpperCase()}</span>
          <span class="tag">${(d.defect_type||'').toUpperCase()}</span>
          ${d.ri_flag?'<span class="flag">⚠ REFER TO RI</span>':''}
        </div>
        <div class="measure">▸ <code>${m.width_mm??'?'} mm</code> wide ·
          <code>${m.length_mm??'?'} mm</code> long · <code>${m.area_mm2??'?'} mm²</code></div>
        <div class="sub">CONFIDENCE ${(d.confidence*100||0).toFixed(0)}%</div>
        <div class="conf"><i style="width:${(d.confidence*100||0)}%;background:${col};box-shadow:0 0 8px ${col}"></i></div>
        <div class="txt">${d.report_text||''}</div>
        <div class="sub"><b>CAUSE:</b> ${d.cause||'—'}<br><b>ANCHOR:</b> ${d.rubric_anchor||'—'}<br>
          <b>ACTION:</b> ${d.recommended_action||'—'}</div>
      </div></div>`;
  }).join('') : '<div class="empty hud" style="padding:40px">NO DEFECTS DETECTED — structure within tolerance.</div>';

  document.getElementById('app').innerHTML = `
    <div class="draft">▲ ${rep.disclaimer||'DRAFT — pending Registered Inspector sign-off.'}</div>
    <div class="grid">
      <div class="hud"><div class="hd">◉ ${(b.name||'SUBJECT BUILDING').toUpperCase()}</div>
        <div class="bd score-wrap">${gauge(h.score??0)}
          <div class="band" style="color:${bandColor(h.score??0)}">${(h.band||'').toUpperCase()}</div>
          <div class="meta">${meta}</div></div></div>
      <div>
        <div class="stats">
          <div class="stat hud" style="color:var(--cyan)"><b>${h.n_defects??0}</b><span>DEFECTS DETECTED</span></div>
          <div class="stat hud" style="color:${(SEV[h.worst_severity]||['','var(--cyan)'])[1]}"><b>${h.worst_severity?('S'+h.worst_severity):'—'}</b><span>WORST SEVERITY</span></div>
          <div class="stat hud" style="color:var(--red)"><b>${h.ri_flags??0}</b><span>FLAGGED FOR RI</span></div>
        </div>
        <h2 class="sec">DEFECT SCHEDULE</h2>
        ${cards}
        <div class="signoff">
          <button class="btn" onclick="this.nextElementSibling.style.display='inline';this.disabled=true;this.textContent='✓ TRANSMITTED'">
            ✍ TRANSMIT TO REGISTERED INSPECTOR</button>
          <span class="ok">◉ AWAITING RI VERIFICATION &amp; SIGNATURE</span>
        </div>
      </div>
    </div>`;
}

function zoom(src){document.getElementById('lbimg').src=src;lb.showModal();}
async function loadPath(){
  const p=document.getElementById('path').value.trim();
  try{const r=await fetch(p,{cache:'no-store'});render(await r.json());}
  catch(e){document.getElementById('app').innerHTML=
    `<div class="empty">⚠ COULD NOT LOAD <code>${p}</code><br><br>Serve survey/ with
     <code>python -m http.server</code>, open <code>/dashboard/</code>, or use FILE….<br><br>${e}</div>`;}
}
function loadFile(ev){const f=ev.target.files[0];if(!f)return;
  const rd=new FileReader();rd.onload=()=>render(JSON.parse(rd.result));rd.readAsText(f);}
loadPath();
</script>
</body>
</html>
