<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Facadia — 3D reconstruction</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; background: #0a0c10; color: #e6e9ef; font: 13px/1.5 system-ui, sans-serif; overflow: hidden; }
    #canvas { position: fixed; inset: 0; }
    #panel {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      background: rgba(18,22,30,.85); border: 1px solid #232a38; border-radius: 10px;
      padding: 12px 14px; width: 250px; backdrop-filter: blur(6px);
    }
    #panel h1 { margin: 0 0 2px; font-size: 14px; }
    #panel p { margin: 0 0 10px; color: #8b94a7; font-size: 11px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 8px 0; }
    .row label { color: #aab2c3; }
    input[type=range] { width: 130px; }
    button { background: #1d2533; color: #e6e9ef; border: 1px solid #2c3548; border-radius: 6px; padding: 5px 8px; cursor: pointer; font-size: 12px; }
    button:hover { background: #273245; }
    #status { color: #6b7488; font-size: 11px; margin-top: 8px; }
    input[type=file] { font-size: 11px; width: 100%; margin-top: 4px; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="panel">
    <h1>Facadia — reconstructed scene</h1>
    <p>drag to orbit · scroll to zoom · right-drag to pan</p>
    <div class="row"><label>Point size (px)</label><input id="size" type="range" min="0.5" max="10" step="0.5" value="2"></div>
    <div class="row"><label>Show cameras</label><input id="cams" type="checkbox"></div>
    <div class="row"><label>Cinematic</label>
      <select id="cine">
        <option value="off">off</option>
        <option value="orbit">orbit</option>
        <option value="path">capture path</option>
      </select></div>
    <div class="row"><label>Speed</label><input id="speed" type="range" min="0.1" max="2" step="0.1" value="0.5"></div>
    <div class="row"><button id="bg">Toggle background</button><button id="fit">Recenter</button></div>
    <input id="file" type="file" accept=".glb,.gltf" />
    <div id="status">loading…</div>
  </div>

  <script type="importmap">
  { "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }}
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    // Auto-loads viewer/scene_final.glb on open (zero clicks for the demo).
    // Override with ?src=../out_single2/scene.glb to point at any run.
    const SRC = new URLSearchParams(location.search).get("src") || "scene_final.glb";

    const canvas = document.getElementById("canvas");
    const status = document.getElementById("status");
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    const scene = new THREE.Scene();
    let bg = 0; const bgs = [0x0a0c10, 0x000000, 0x20242c, 0xf0f0f0];
    scene.background = new THREE.Color(bgs[bg]);

    const camera = new THREE.PerspectiveCamera(55, 1, 0.001, 5000);
    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;

    const pointMats = [];      // PointsMaterial instances, for the size slider
    const cameraNodes = [];    // frustum meshes, for the toggle
    let modelRoot = null;

    // Scene bounds + recovered camera path, for the cinematic modes.
    const sceneCenter = new THREE.Vector3();
    let sceneRadius = 1;
    let camCurve = null;       // CatmullRom through the recovered camera centers
    let cineT = 0;             // cinematic clock

    function resize() {
      const w = innerWidth, h = innerHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h; camera.updateProjectionMatrix();
    }
    addEventListener("resize", resize); resize();

    function frame() {
      if (!modelRoot) return;
      const box = new THREE.Box3().setFromObject(modelRoot);
      const sphere = box.getBoundingSphere(new THREE.Sphere());
      const r = sphere.radius || 1;
      sceneCenter.copy(sphere.center); sceneRadius = r;
      controls.target.copy(sphere.center);
      camera.position.copy(sphere.center).add(new THREE.Vector3(r * 1.6, r * 0.9, r * 1.6));
      camera.near = r / 100; camera.far = r * 100; camera.updateProjectionMatrix();
      controls.update();
    }

    function applySize(v) { for (const m of pointMats) { m.size = v; m.needsUpdate = true; } }

    function load(url, asObjectURL) {
      status.textContent = "loading…";
      pointMats.length = 0; cameraNodes.length = 0;
      if (modelRoot) { scene.remove(modelRoot); modelRoot = null; }
      new GLTFLoader().load(url, (gltf) => {
        modelRoot = gltf.scene;
        let nPoints = 0;
        modelRoot.traverse((o) => {
          if (o.isPoints) {
            // Fixed PIXEL size (sizeAttenuation off) so points stay crisp and
            // small regardless of the scene's world scale (ours is ~0.2 units).
            const m = new THREE.PointsMaterial({ size: parseFloat(sizeEl.value),
              vertexColors: true, sizeAttenuation: false });
            o.material = m; pointMats.push(m);
            nPoints += o.geometry.attributes.position.count;
          } else if (o.isMesh) {
            cameraNodes.push(o);                       // the camera frustums
            o.material = new THREE.MeshBasicMaterial({ color: 0xff5050 });
          }
        });
        for (const c of cameraNodes) c.visible = camsEl.checked;   // honor toggle on load
        scene.add(modelRoot);
        frame();

        // Build a smooth path through the recovered camera centers (capture path).
        modelRoot.updateMatrixWorld(true);
        const named = cameraNodes
          .map((c) => ({ name: c.name || "", p: c.getWorldPosition(new THREE.Vector3()) }))
          .sort((a, b) => a.name.localeCompare(b.name));   // cam_00, cam_01, ... = temporal
        camCurve = named.length > 1
          ? new THREE.CatmullRomCurve3(named.map((n) => n.p), false, "catmullrom", 0.5)
          : null;

        status.textContent = `${nPoints.toLocaleString()} points · ${cameraNodes.length} cameras`;
        if (asObjectURL) URL.revokeObjectURL(url);
      }, undefined, (e) => { status.textContent = "could not load " + url; console.error(e); });
    }

    const sizeEl = document.getElementById("size");
    const camsEl = document.getElementById("cams");
    const cineEl = document.getElementById("cine");
    const speedEl = document.getElementById("speed");
    sizeEl.addEventListener("input", () => applySize(parseFloat(sizeEl.value)));
    camsEl.addEventListener("change", (e) => {
      for (const c of cameraNodes) c.visible = e.target.checked;
    });
    cineEl.addEventListener("change", () => {
      cineT = 0;
      controls.enabled = cineEl.value === "off";   // hand control to the animation
      if (cineEl.value === "off") frame();
    });
    document.getElementById("bg").addEventListener("click", () => {
      bg = (bg + 1) % bgs.length; scene.background = new THREE.Color(bgs[bg]);
    });
    document.getElementById("fit").addEventListener("click", frame);
    document.getElementById("file").addEventListener("change", (e) => {
      const f = e.target.files[0]; if (f) load(URL.createObjectURL(f), true);
    });

    // ---- cinematic camera animation ----
    function cinematic(dt) {
      const mode = cineEl.value;
      if (mode === "off" || !modelRoot) return;
      const speed = parseFloat(speedEl.value);
      cineT += dt * speed;
      if (mode === "orbit") {
        const r = sceneRadius * 2.2, el = sceneRadius * 0.9;
        camera.position.set(
          sceneCenter.x + r * Math.cos(cineT * 0.4),
          sceneCenter.y + el,
          sceneCenter.z + r * Math.sin(cineT * 0.4));
        camera.lookAt(sceneCenter);
      } else if (mode === "path" && camCurve) {
        const u = (cineT * 0.08) % 1;                 // loop along the capture path
        camera.position.copy(camCurve.getPoint(u));
        camera.lookAt(sceneCenter);                   // always frame the scene
      }
    }

    let last = performance.now();
    (function loop(now) {
      requestAnimationFrame(loop);
      const dt = Math.min(0.05, (now - last) / 1000); last = now;
      cinematic(dt);
      if (controls.enabled) controls.update();
      renderer.render(scene, camera);
    })(last);
    load(SRC, false);
  </script>
</body>
</html>
