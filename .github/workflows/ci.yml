name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt JS actions into Node 24 (clears the Node 20 deprecation notice).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  survey:
    name: survey · lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: survey
    steps:
      - uses: actions/checkout@v5

      - name: System libs for OpenCV (headless runner)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync deps (incl. dev)
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest
